<style>
  /* Here we used the CSS @font-face structure to upload two different Poppins fonts to our project: regular and bold.
  It is important that the .ttf files (downloaded from Google Fonts) which contain the font information are located with the rest of our coding files. 
  Once the fonts are made available in this <style> block, they can be accessed in our main HTML code using style="font-family: _____;" */

  @font-face {
    font-family: "Poppins";
    src: url("Poppins-Regular.ttf") format("truetype");
    font-weight: normal;
    font-style: normal;
  }

  @font-face {
    font-family: "Poppins Bold";
    src: url("Poppins-Bold.ttf") format("truetype");
    font-weight: bold;
    font-style: normal;
  }
</style>

              <v-dialog persistent v-model=tutorialOpen style="width: 85vw; height: 60vw;">
                <v-card color="white">
                  <v-card-title align="center" style="font-family: Poppins Bold;" class="ma-4">Tutorial</v-card-title>
                  <v-card-text style="font-family: Poppins;">    
                    1. Welcome to <b>Jeopardy: Whale Health!</b>. This game contains 5 different categories of questions concerning human impacts on whale health: Anatomy, Noise, Stress, Collisions, and Toxins. You are free to select any of the 20 multiple-choice questions and click on one of the 4 available answer options (A, B, C, or D) to log your answer. You can customize your learning experience by selecting questions in whatever order is most intuitive to you! <br><br>
                    2. Each section has 4 questions, with increasing point values (200, 400, 600, 800) that correspond to increasing <b>“uncomfortability.”</b> Essentially, the questions are grouped together based on how much they challenge anthropocentrism and cause uncomfortability in the human user (you). Unlike typical Jeopardy, which rewards players for choosing increasingly <i>difficult</i> questions, this game rewards players for choosing to confront increasingly <i>uncomfortable</i> topics of anthropocentric shipping, pollution, and extractive practices, and their impacts on whale health. This approach was inspired by Katherine Hayles’ integrated cognitive framework (ICF), as described in the <b>About Game</b> section of this module. <br><br>
                    3. If you select the correct answer, you'll earn the associated number of points. If you select an incorrect answer, you won't earn any points. Each question can only be answered once, so think carefully! After reading the corresponding explanation, you can select another question by selecting the “Exit” button. <br><br>
                    4. You are encouraged to <b>embrace the uncomfortability</b> of this experience. Why are these questions uncomfortable? Please reflect on your perspective of humans and whales, and our interactions with one another. Once you've answered all 20 questions, the game will end, and your total score will be displayed.
    
                  <div class="d-flex justify-center ma-6">
                    <v-btn @click="toggleTutorialOpenClosed()" color="#85C79A" style="font-family: Poppins; width: 10vw; height: 4vh; color: white;">Exit</v-btn>
                  </div>
    
                </v-card>
              </v-dialog>
    
              <v-btn @click="toggleLearnMoreOpenClosed()" style="font-family: Poppins; width: 20vw; height: 12vh; font-size: 1.5vw; color:white;" color="#85C79A" class="mt-6 ml-8">About Game</v-btn>
    
              <v-dialog persistent v-model=learnMoreOpen style="width: 85vw; height: 60vw;">
                <!-- Persistent keyword ensures that the dialog doesn't close if the user clicks somewhere else on the page. It only closes if they use the "Exit" button. -->
                <v-card color="white">
                  <v-card-title align="center" style="font-family: Poppins Bold;" class="ma-4">Theme & Critical Lense</v-card-title>
                  <v-card-text style="font-family: Poppins; text-indent: 50px;"> <!-- "text-indent: 50px" causes each paragraph to start with an indentation. -->
                    This module builds on the larger website theme of whale life by exploring whale health and wellbeing. In particular, our module is focused on the role that anthropocentrism plays in perpetuating human activity that is harmful to whales. Anthropocentrism, broadly speaking, refers to the viewpoint that human life is more valuable and significant than other life forms. This viewpoint fuels extractivist and exploitative behaviour that harms the environment and animal life. 
                  </v-card-text>
                  <v-card-text style="font-family: Poppins; text-indent: 50px;">
                    Drawing upon <a href="http://ebookcentral.proquest.com/lib/mcmu/detail.action?docID=31887642" target="_blank">Katherine Hayles’ integrated cognitive framework (ICF)</a>, we challenge anthropocentrism by “humanizing” whales as independent actors in relation to humans. Our Jeopardy game on whale health causes users to confront the dehumanization of humans and simultaneous humanization of whales. Accordingly, users will re-learn cognition as something that is possessed by non-human species, including whales. To achieve this, the language of our Jeopardy questions refers to humans by their species name, <i>Homo sapiens</i>, and emphasize the human-like characteristics of whales. For example, instead of referring to young whales as "calves", we call them as "babies". Additionally, instead of rewarding more points for more <i>difficult</i> questions, we will more points for increasingly <i>uncomfortable</i> topics that challenge the user's anthropocentric values and biases. These questions look at the imact of shipping, pollution, and other human practices on whale health and wellbeing.
                  </v-card-text> 
                  <v-card-text style="font-family: Poppins; text-indent: 50px;">
                    Hayles (2025) also argues that “cognitive assemblages,” or decision-making collectives of humans, nonhumans, and computational media, determine the choices that humans make. Humans’ decisions and ideas are formed and mediated by computational media (Hayles, 2025). Jeopardy, a game that has been traditionally framed as the intellectual pursuit of objective truths, is an example of a cognitive assemblage. By employing Jeopardy’s epistemic authority, our module reframes whale health not as an isolated environmental tragedy but as a consequence of widespread and harmful anthropocentrism.              
                  </v-card-text>

                    <v-btn @click="toggleLearnMoreOpenClosed()" color="#85C79A"
                      style="font-family: Poppins; width: 10vw; height: 4vh; color: white;">Exit</v-btn>
                  </div>
    
                </v-card>
              </v-dialog>
